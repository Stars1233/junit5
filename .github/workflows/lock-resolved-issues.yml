name: Lock resolved issues

on:
  schedule:
    - cron: '0/10 * * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: lock-resolved-issues

jobs:
  action:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      discussions: write
    steps:
      - uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7 # v6.0.0
        with:
          process-only: issues
          log-output: true
